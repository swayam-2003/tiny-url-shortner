worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limit zones (first line of defense)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=shorten:10m      rate=5r/s;
    limit_req_zone $binary_remote_addr zone=redirect:10m     rate=100r/s;

    # Connection limits per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Upstream — round-robin load balancer across API replicas
    upstream api_backend {
        least_conn;
        server api1:3001 max_fails=3 fail_timeout=30s;
        server api2:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        server frontend:5173;
    }

    # Security headers (applied to all responses)
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=()" always;

    server {
        listen 80;
        server_name localhost;

        # Request size limits
        client_max_body_size 16k;
        client_body_timeout  10s;
        client_header_timeout 10s;

        # Per-IP connection limit
        limit_conn conn_per_ip 20;

        # Block common attack paths
        location ~ /\.(git|env|htaccess) { return 404; }
        location ~ /(wp-admin|wp-login|\.php)$ { return 404; }

        # Health (no rate limit — for load balancer probes)
        location = /health {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API — general rate limit
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # Shorten endpoint — stricter rate limit
        location = /api/v1/urls {
            limit_req zone=shorten burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Redirect hot path — high throughput limit
        location ~ ^/[a-zA-Z0-9_-]{3,12}$ {
            limit_req zone=redirect burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # React frontend
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }
    }
}
