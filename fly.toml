# Fly.io config (optional — requires credit card verification)
# Option B production uses Render/Koyeb — see DEPLOY.md

app = 'tiny-url-shortner'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.production'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  SERVE_STATIC = 'true'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
