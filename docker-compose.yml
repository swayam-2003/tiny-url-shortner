services:
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shortner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shortner"]
      interval: 10s
      timeout: 5s
      retries: 3

  api1:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/shortner
      REDIS_URL: redis://redis:6379
      PORT: 3001
      BASE_URL: http://localhost
      SERVER_ID: api1
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    profiles: [full]

  api2:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/shortner
      REDIS_URL: redis://redis:6379
      PORT: 3001
      BASE_URL: http://localhost
      SERVER_ID: api2
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    profiles: [full]

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost
    profiles: [full]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - frontend
    restart: unless-stopped
    profiles: [full]

volumes:
  redis_data:
  pg_data:
