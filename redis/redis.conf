# Redis policy for TinyURL shortener
# Strategy: Cache-Aside (Lazy Loading) — app manages cache explicitly

maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence: RDB snapshots for counter recovery
save 900 1
save 300 10
save 60 10000

appendonly no

# Security (dev: protected-mode off for host→Docker access)
protected-mode no
bind 0.0.0.0

# Logging
loglevel notice
